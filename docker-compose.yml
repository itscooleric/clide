x-base: &base
  build:
    context: .
    args:
      CLIDE_UID: ${CLIDE_UID:-1100}
      CLIDE_GID: ${CLIDE_GID:-1100}
      BUILD_VERSION: ${BUILD_VERSION:-dev}
  image: clide
  env_file: .env
  environment:
    CLAUDE_CODE_SIMPLE: ${CLAUDE_CODE_SIMPLE:-}
    CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
    CLIDE_TMUX: ${CLIDE_TMUX:-}
    OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    GITLAB_TOKEN: ${GITLAB_TOKEN:-}
    GITLAB_HOST: ${GITLAB_HOST:-}
    # Session logging (v4: Agent Observability)
    CLIDE_LOG_DISABLED: ${CLIDE_LOG_DISABLED:-}
    CLIDE_MAX_SESSIONS: ${CLIDE_MAX_SESSIONS:-0}
    # Push notifications via ntfy (v4: Agent Observability)
    CLIDE_NTFY_URL: ${CLIDE_NTFY_URL:-}
    CLIDE_NTFY_TOPIC: ${CLIDE_NTFY_TOPIC:-clide}
    CLIDE_NTFY_DISABLED: ${CLIDE_NTFY_DISABLED:-}
    # Egress audit — log outbound connections to JSONL (v4: Agent Observability)
    CLIDE_EGRESS_AUDIT: ${CLIDE_EGRESS_AUDIT:-0}
    # Intercepting proxy — capture full HTTP(S) requests/responses (v4)
    CLIDE_INTERCEPT: ${CLIDE_INTERCEPT:-0}
    CLIDE_INTERCEPT_BODIES: ${CLIDE_INTERCEPT_BODIES:-0}
    # ttyd tuning — set TTYD_RECONNECT=0 to disable auto-reconnect
    TTYD_RECONNECT: ${TTYD_RECONNECT:-}
    TTYD_PING_INTERVAL: ${TTYD_PING_INTERVAL:-30}
    # Auth proxy mode — delegate auth to Caddy/nginx (fixes iOS/Safari WebSocket bug)
    TTYD_AUTH_PROXY: ${TTYD_AUTH_PROXY:-}
    # LAN CA certificate (e.g. Caddy internal TLS root)
    CLIDE_CA_URL: ${CLIDE_CA_URL:-}
    # Container monitoring (v5: #45-48)
    CLIDE_METRICS_DISABLED: ${CLIDE_METRICS_DISABLED:-}
    CLIDE_POLL_INTERVAL: ${CLIDE_POLL_INTERVAL:-30}
  # Drop all capabilities then re-add only what entrypoint + firewall need.
  # NET_ADMIN  — iptables egress rules (set CLIDE_FIREWALL=0 to disable)
  # SETUID/GID — gosu privilege drop from root → clide
  # CHOWN/FOWNER — ownership fixup on bind-mounted workspace
  # DAC_OVERRIDE — lets root bypass host-UID permission checks on bind mounts
  #                (required for mkdir /workspace/.clide during setup)
  cap_drop:
    - ALL
  cap_add:
    - NET_ADMIN
    - SETUID
    - SETGID
    - CHOWN
    - FOWNER
    - DAC_OVERRIDE
  # Prevent processes from gaining new privileges via setuid/setgid binaries.
  security_opt:
    - no-new-privileges:true
  # Resource guardrails — prevent runaway AI workloads from starving the host.
  # Override via .env: CLIDE_MEM_LIMIT, CLIDE_CPUS, CLIDE_PIDS_LIMIT
  # Use '2.0' on 2-core VPS, '4.0' on 4+ core hosts.
  mem_limit: ${CLIDE_MEM_LIMIT:-4g}
  cpus: '${CLIDE_CPUS:-2.0}'
  pids_limit: ${CLIDE_PIDS_LIMIT:-512}
  volumes:
    - ${PROJECT_DIR:-..}:/workspace
  stdin_open: true
  tty: true

services:
  # Web terminal (ttyd) — browser-based shell with all CLIs
  web:
    <<: *base
    entrypoint: ["/usr/local/bin/entrypoint.sh"]
    command: []
    ports:
      - "${CLIDE_BIND:-0.0.0.0}:${TTYD_PORT:-7681}:7681"
    # To use Caddy reverse proxy (recommended for iOS/mobile):
    #   See docker-compose.override.yml.example
    #   Set TTYD_AUTH_PROXY=true in .env

  # Headless shell — same image, all CLIs available, no web terminal
  cli:
    <<: *base
    entrypoint: ["/usr/local/bin/claude-entrypoint.sh"]
    command: ["/bin/bash"]

# Persistent state is stored in /workspace/.clide/ (within the bind-mounted
# project directory) — no named volumes needed. This avoids Docker's
# root-owned volume permission issues and keeps all clide data in one place.
