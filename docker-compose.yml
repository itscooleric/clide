x-base: &base
  build:
    context: .
    args:
      CLIDE_UID: ${CLIDE_UID:-1000}
      CLIDE_GID: ${CLIDE_GID:-1000}
  image: clide
  env_file: .env
  environment:
    CLAUDE_CODE_SIMPLE: ${CLAUDE_CODE_SIMPLE:-1}
    CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
    CLIDE_TMUX: ${CLIDE_TMUX:-}
    OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    GITLAB_TOKEN: ${GITLAB_TOKEN:-}
    GITLAB_HOST: ${GITLAB_HOST:-}
    # Session logging (v4: Agent Observability)
    CLIDE_LOG_DISABLED: ${CLIDE_LOG_DISABLED:-}
    CLIDE_MAX_SESSIONS: ${CLIDE_MAX_SESSIONS:-30}
    # Push notifications via ntfy (v4: Agent Observability)
    CLIDE_NTFY_URL: ${CLIDE_NTFY_URL:-}
    CLIDE_NTFY_TOPIC: ${CLIDE_NTFY_TOPIC:-clide}
    CLIDE_NTFY_DISABLED: ${CLIDE_NTFY_DISABLED:-}
  # Drop all capabilities then re-add only what entrypoint + firewall need.
  # NET_ADMIN  — iptables egress rules (set CLIDE_FIREWALL=0 to disable)
  # SETUID/GID — gosu privilege drop from root → clide
  # CHOWN/FOWNER — ownership fixup on bind-mounted workspace
  # DAC_OVERRIDE — lets root bypass host-UID permission checks on bind mounts
  #                (required for mkdir /workspace/.clide during setup)
  cap_drop:
    - ALL
  cap_add:
    - NET_ADMIN
    - SETUID
    - SETGID
    - CHOWN
    - FOWNER
    - DAC_OVERRIDE
  # Prevent processes from gaining new privileges via setuid/setgid binaries.
  security_opt:
    - no-new-privileges:true
  # Resource guardrails — prevent runaway AI workloads from starving the host.
  mem_limit: 4g
  cpus: '4.0'
  pids_limit: 512
  volumes:
    - ${PROJECT_DIR:-..}:/workspace
  stdin_open: true
  tty: true

networks:
  caddy:
    external: true
    # Only used when service explicitly joins it

services:
  # Web terminal (ttyd) - access all CLIs via browser
  web:
    <<: *base
    entrypoint: ["/usr/local/bin/entrypoint.sh"]
    command: []
    ports:
      - "${TTYD_PORT:-7681}:7681"
    labels:
      # Caddy Docker Proxy labels (only active if on caddy network)
      caddy: ${CADDY_HOSTNAME:-clide.lan.wubi.sh}
      caddy.tls: ${CADDY_TLS:-internal}
      caddy.reverse_proxy: "{{upstreams 7681}}"

  # Interactive shell — all three CLIs available (claude config pre-seeded)
  shell:
    <<: *base
    entrypoint: ["/usr/local/bin/claude-entrypoint.sh"]
    command: ["/bin/bash"]

  # GitHub Copilot CLI
  copilot:
    <<: *base
    entrypoint: ["/usr/local/bin/firewall.sh"]
    command: ["copilot"]

  # GitHub CLI
  gh:
    <<: *base
    entrypoint: ["/usr/local/bin/firewall.sh"]
    command: ["gh"]

  # Claude Code CLI
  claude:
    <<: *base
    entrypoint: ["/usr/local/bin/claude-entrypoint.sh"]
    command: []

  # Codex CLI (OpenAI)
  codex:
    <<: *base
    entrypoint: ["/usr/local/bin/firewall.sh"]
    command: ["codex"]

# Persistent state is stored in /workspace/.clide/ (within the bind-mounted
# project directory) — no named volumes needed. This avoids Docker's
# root-owned volume permission issues and keeps all clide data in one place.
